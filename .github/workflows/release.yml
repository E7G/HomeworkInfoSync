name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.4
        with:
          run-install: true

      - name: Build with PyInstaller
        run: pixi run pyinstaller --noconfirm --onefile --windowed --name HomeworkSync --icon icon.ico --add-data "config.example.json;." --add-data "icon.png;." --add-data "icon.ico;." gui.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HomeworkSync.exe
          generate_release_notes: true
