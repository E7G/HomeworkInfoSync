[workspace]
authors = ["E7G <55611737+E7G@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "HomeworkInfoSync"
platforms = ["win-64"]
version = "0.1.0"

[pypi-options]
index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"
extra-index-urls = ["https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"]

[tasks]
remind = "python homework_reminder.py"
gui = "python gui.py"

[dependencies]
python = ">=3.14.4,<3.15"
requests = ">=2.33.1,<3"
beautifulsoup4 = ">=4.14.3,<5"
websocket-client = ">=1.9.0,<2"
qrcode = ">=8.2,<9"
pillow = ">=12.2.0,<13"
pyinstaller = ">=6.13.0,<7"

[pypi-dependencies]
pyqt6 = ">=6.11.0,<7"
